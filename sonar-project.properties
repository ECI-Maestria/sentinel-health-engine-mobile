sonar.projectKey=ECI-Maestria_sentinel-health-engine-mobile
sonar.organization=eci-maestria-mobile
sonar.projectName=Sentinel Health

# Solo app (el wearable no tiene tests)
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java

# Binarios compilados — apuntamos a la carpeta raíz del build para que
# SonarCloud los encuentre sin importar la versión de AGP
sonar.java.binaries=app/build

# Rutas posibles del reporte XML según versión de AGP (SonarCloud usa la primera que exista)
sonar.coverage.jacoco.xmlReportPaths=\
  app/build/reports/coverage/test/debug/report.xml,\
  app/build/reports/jacoco/testDebugUnitTest/testDebugUnitTest.xml,\
  app/build/outputs/unit_test_code_coverage/debugUnitTest/testDebugUnitTest.exec

sonar.exclusions=**/*Test*.kt,**/R.kt,**/BuildConfig.kt,**/databinding/**,**/room/**/*_Impl.kt
sonar.coverage.exclusions=**/*Test*.kt,**/R.kt,**/BuildConfig.kt
