name: SonarCloud Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      # 1️ Clonar repo completo (fetch-depth: 0 necesario para blame de SonarCloud)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️ Configurar Java 17 (coincide con compileOptions del proyecto)
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️ Cache de Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      # 4️ Recrear google-services.json desde secret (Firebase lo requiere en compile-time)
      #    → En GitHub: Settings > Secrets > Actions > New secret
      #    → Nombre: GOOGLE_SERVICES_JSON
      #    → Valor: contenido completo del archivo app/google-services.json
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # 5 Crear local.properties vacío (las claves de Azure tienen fallback "" en build.gradle)
      - name: Create local.properties
        run: touch local.properties

      # 6️ Permisos para Gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 7️ Compilar + tests + coverage del módulo app
      - name: Run tests with coverage
        run: ./gradlew :app:testDebugUnitTest :app:createDebugUnitTestCoverageReport

      # 7b️ Subir reporte de coverage como artefacto (útil para depurar rutas)
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/coverage/
          if-no-files-found: warn

      # 8️ SonarCloud — lee config de sonar-project.properties en la raíz
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # decoración de PRs
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # Settings > Secrets > SONAR_TOKEN
